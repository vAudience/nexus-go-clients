openapi: 3.0.1
info:
  contact: {}
  description: API for the vAudience AI File Manager
  license:
    name: LicenseRef-Copyrighted
    url: https://www.vaudience.ai
  title: vAudience AI File Manager API
  version: 0.4.4
servers:
- url: https://file-manager.dev.ai.vaud.one/
tags:
- description: anything related to the Files route
  name: Files
- description: anything related to the Files Metadata route
  name: Files Metadata
- description: anything related to the Health route
  name: Health
- description: anything related to the Metrics route
  name: Metrics
- description: anything related to the Version route
  name: Version
paths:
  /info/health:
    get:
      description: returns the health status of all registered service dependencies;
        responds with 200 when all checks pass or 503 when any dependency is unhealthy
      operationId: HealthGet
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
          description: OK
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
          description: Service Unavailable
      summary: aggregated health check for all service dependencies
      tags:
      - Health
  /info/metrics:
    get:
      description: go prometheus client provides this standard (basic) metrics endpoint
      operationId: MetricsGet
      responses:
        "200":
          content: {}
          description: OK
        "500":
          content: {}
          description: Internal Server Error
      summary: Prometheus provided metrics endpoint
      tags:
      - Metrics
  /info/version:
    get:
      description: returns the version number of this service
      operationId: VersionGet
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
          description: OK
      summary: returns the service version
      tags:
      - Version
  /v1/file-access-tokens:
    post:
      description: Create a file access token
      operationId: CreateFileAccessToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileAccessTokenRequest"
        description: File access token request
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileAccessTokenResponse"
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal Server Error
      security:
      - ApiKey: []
      summary: Create a file access token
      tags:
      - Files
      x-codegen-request-body-name: fileAccessTokenRequest
  /v1/files/{id_or_storage_path}:
    delete:
      description: Delete a file
      operationId: DeleteFile
      parameters:
      - description: File metadata ID (UUID) or storage path
        in: path
        name: id_or_storage_path
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileMetadataResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal Server Error
      security:
      - ApiKey: []
      summary: Delete a file
      tags:
      - Files
    get:
      description: Serve a file
      operationId: ServeFile
      parameters:
      - description: File metadata ID (UUID) or storage path
        in: path
        name: id_or_storage_path
        required: true
        schema:
          type: string
      - description: Force download as attachment
        in: query
        name: download
        schema:
          type: boolean
      - description: Custom filename for download
        in: query
        name: filename
        schema:
          type: string
      - description: File access token
        in: query
        name: fat
        schema:
          type: string
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                format: binary
                type: string
            image/*:
              schema:
                format: binary
                type: string
            text/*:
              schema:
                format: binary
                type: string
            application/pdf:
              schema:
                format: binary
                type: string
          description: File content
        "400":
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            image/*:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/*:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/pdf:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            image/*:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/*:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/pdf:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "403":
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            image/*:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/*:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/pdf:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Forbidden
        "404":
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            image/*:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/*:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/pdf:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Not Found
        "500":
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            image/*:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/*:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/pdf:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal Server Error
      security:
      - ApiKey: []
      summary: Serve a file
      tags:
      - Files
  /v1/metadata:
    get:
      description: List file metadata with comprehensive filtering options
      operationId: ListFileMetadata
      parameters:
      - description: "Scope: temp, public, private-org, private-org-user, private-team"
        in: query
        name: scope
        required: true
        schema:
          type: string
      - description: User ID filter
        in: query
        name: user_id
        schema:
          type: string
      - description: Organization ID filter
        in: query
        name: org_id
        schema:
          type: string
      - description: Team ID filter
        in: query
        name: team_id
        schema:
          type: string
      - description: Upload category filter
        in: query
        name: upload_category
        schema:
          type: string
      - description: "Offset (default: 0)"
        in: query
        name: offset
        schema:
          type: integer
      - description: "Limit (default: 50, max: 100)"
        in: query
        name: limit
        schema:
          type: integer
      - description: "Sort field: created_at, file_name, file_size (default: created_at)"
        in: query
        name: sort
        schema:
          type: string
      - description: "Sort order: asc, desc (default: desc)"
        in: query
        name: order
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileMetadataListResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal Server Error
      security:
      - ApiKey: []
      summary: List file metadata
      tags:
      - Files Metadata
    post:
      description: Get metadata for multiple files
      operationId: GetFileMetadataBatch
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileMetadataBatchGetRequest"
        description: Batch request with file paths
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileMetadataBatchResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal Server Error
      security:
      - ApiKey: []
      summary: Get metadata for multiple files
      tags:
      - Files Metadata
      x-codegen-request-body-name: batchrequest
  /v1/metadata/{storage_path}:
    get:
      description: Get file metadata by path
      operationId: GetFileMetadata
      parameters:
      - description: Storage path
        in: path
        name: storage_path
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileMetadataResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal Server Error
      security:
      - ApiKey: []
      summary: Get file metadata by path
      tags:
      - Files Metadata
  /v1/organizations/{org_id}/files/categories:
    get:
      description: Get file upload categories
      operationId: GetFileUploadCategories
      parameters:
      - description: organization ID
        in: path
        name: org_id
        required: true
        schema:
          type: string
      - description: "Comma separated list of model capabilities to filter by, e.g.\
          \ text-to-text,image-to-text"
        in: query
        name: model_capabilities
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/FileUploadCategoryResponse"
                type: array
          description: OK
        "401":
