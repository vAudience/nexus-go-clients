          description: Forbidden
      security:
      - ApiKey: []
      summary: Get file upload categories
      tags:
      - Files
  /v1/organizations/{org_id}/files/duplicate:
    post:
      description: Duplicate a file
      operationId: DuplicateFile
      parameters:
      - description: organization ID
        in: path
        name: org_id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileDuplicateRequest"
        description: File duplicate request
        required: true
      responses:
        "201":
